apiVersion: 1

contactPoints:
  - orgId: 1
    name: ops-email
    receivers:
      - uid: ops-email-receiver
        type: email
        settings:
          addresses: sre@ministry-platform.local
          singleEmail: false
        disableResolveMessage: false

  - orgId: 1
    name: ops-slack
    receivers:
      - uid: ops-slack-receiver
        type: slack
        settings:
          url: ${SLACK_WEBHOOK_URL}
          recipient: "#ops-alerts"
          title: '{{ template "default.title" . }}'
          text: '{{ template "default.message" . }}'
        disableResolveMessage: false

  - orgId: 1
    name: ops-discord
    receivers:
      - uid: ops-discord-receiver
        type: webhook
        settings:
          url: ${DISCORD_WEBHOOK_URL}
          httpMethod: POST
        disableResolveMessage: false

  - orgId: 1
    name: ops-webhook
    receivers:
      - uid: ops-webhook-receiver
        type: webhook
        settings:
          url: http://webhook-relay:8080/grafana/alerts
          httpMethod: POST
        disableResolveMessage: false
