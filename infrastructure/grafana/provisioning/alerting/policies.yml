apiVersion: 1

policies:
  - orgId: 1
    receiver: ops-webhook
    group_by:
      - alertname
      - service
      - severity
      - domain
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 3h
    routes:
      - receiver: ops-email
        object_matchers:
          - ["severity", "=", "critical"]
      - receiver: ops-slack
        object_matchers:
          - ["severity", "=", "high"]
      - receiver: ops-discord
        object_matchers:
          - ["severity", "=", "medium"]
      - receiver: ops-webhook
        object_matchers:
          - ["domain", "=", "payments"]
      - receiver: ops-webhook
        object_matchers:
          - ["domain", "=", "notifications"]
