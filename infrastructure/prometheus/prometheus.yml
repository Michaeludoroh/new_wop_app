global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: development
    stack: ministry-platform

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]
        labels:
          service: prometheus

  - job_name: ministry_api
    metrics_path: /api/v1/metrics
    static_configs:
      - targets: ["api:4000"]
        labels:
          service: api
          layer: backend

  - job_name: ministry_websocket
    metrics_path: /api/v1/metrics
    static_configs:
      - targets: ["websocket:4100"]
        labels:
          service: websocket
          layer: realtime

  - job_name: redis_exporter
    metrics_path: /metrics
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: redis
          layer: cache

  - job_name: postgres_exporter
    metrics_path: /metrics
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: postgres
          layer: database
