name: ministry-platform-dev

services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: ministry_prometheus_dev
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infrastructure/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - ministry_net_dev
    depends_on:
      api:
        condition: service_healthy
      websocket:
        condition: service_healthy
      alertmanager:
        condition: service_started

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: ministry_alertmanager_dev
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - ./infrastructure/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./infrastructure/alertmanager/secrets:/etc/alertmanager/secrets:ro
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    restart: unless-stopped
    networks:
      - ministry_net_dev

  grafana:
    image: grafana/grafana:11.2.0
    container_name: ministry_grafana_dev
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3005:3000"
    restart: unless-stopped
    networks:
      - ministry_net_dev
    depends_on:
      prometheus:
        condition: service_started

  redis-exporter:
    image: oliver006/redis_exporter:v1.63.0
    container_name: ministry_redis_exporter_dev
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - "9121:9121"
    restart: unless-stopped
    networks:
      - ministry_net_dev
    depends_on:
      redis:
        condition: service_healthy

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: ministry_postgres_exporter_dev
    environment:
      DATA_SOURCE_NAME: postgresql://postgres:postgres@postgres:5432/ministry?sslmode=disable
    ports:
      - "9187:9187"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ministry_net_dev

  postgres:
    image: postgres:16-alpine
    container_name: ministry_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ministry}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ministry_password}
      POSTGRES_DB: ${POSTGRES_DB:-ministry_platform}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ministry} -d ${POSTGRES_DB:-ministry_platform}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ministry_net_dev

  redis:
    image: redis:7-alpine
    container_name: ministry_redis_dev
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - ministry_net_dev

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: ministry_api_dev
    restart: unless-stopped
    init: true
    command: ["node", "dist/src/main.js"]
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-ministry}:${POSTGRES_PASSWORD:-ministry_password}@postgres:5432/${POSTGRES_DB:-ministry_platform}?schema=public
      REDIS_URL: redis://redis:6379
      REDIS_ADAPTER_ENABLED: "true"
      WEBSOCKET_ONLY_MODE: "false"
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:4000/api/v1/health', (r) => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - ministry_net_dev

  websocket:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    command: ["node", "dist/src/main.js"]
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 4100
      DATABASE_URL: postgresql://${POSTGRES_USER:-ministry}:${POSTGRES_PASSWORD:-ministry_password}@postgres:5432/${POSTGRES_DB:-ministry_platform}?schema=public
      REDIS_URL: redis://redis:6379
      REDIS_ADAPTER_ENABLED: "true"
      WEBSOCKET_ONLY_MODE: "true"
    ports:
      - "3002:4100"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:4100/api/v1/health', (r) => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - ministry_net_dev

  admin-web:
    build:
      context: ./apps/admin-web
      dockerfile: Dockerfile
    container_name: ministry_admin_web_dev
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 3001
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000/api/v1}
      NEXT_PUBLIC_WEBSOCKET_URL: ${NEXT_PUBLIC_WEBSOCKET_URL:-http://localhost:4100}
    ports:
      - "${ADMIN_WEB_PORT:-3001}:3001"
    depends_on:
      api:
        condition: service_healthy
      websocket:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - ministry_net_dev

volumes:
  postgres_dev_data:
  redis_dev_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:

networks:
  ministry_net_dev:
    driver: bridge
