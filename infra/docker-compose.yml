version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: ministry_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ministry
      POSTGRES_PASSWORD: ministry_password
      POSTGRES_DB: ministry_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ministry_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
