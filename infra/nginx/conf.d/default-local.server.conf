# Default catch-all for compose health checks via reverse-proxy container
server {
  listen 8080 default_server;
  listen [::]:8080 default_server;
  server_name _;

  location /health/nginx {
    access_log off;
    return 200 "nginx ok\n";
    add_header Content-Type text/plain;
  }

  location /api/ {
    proxy_pass http://ministry_api;
    proxy_http_version 1.1;
    proxy_set_header Host api.localhost;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /realtime {
    proxy_pass http://ministry_websocket;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host ws.localhost;
  }

  location / {
    proxy_pass http://ministry_admin;
    proxy_http_version 1.1;
    proxy_set_header Host admin.localhost;
  }
}
