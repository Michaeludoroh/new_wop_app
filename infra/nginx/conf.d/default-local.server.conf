# Internal Docker Nginx listener (published as 127.0.0.1:8080 only).
# Public apex TLS and Flask routing are owned by host Nginx (mwpp site).
server {
  listen 8080 default_server;
  listen [::]:8080 default_server;
  server_name _;

  location /health/nginx {
    access_log off;
    return 200 "nginx ok\n";
    add_header Content-Type text/plain;
  }

  location /api/ {
    proxy_pass http://$ministry_api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Correlation-Id $http_x_correlation_id;
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
  }

  location /realtime {
    proxy_pass http://$ministry_websocket_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_buffering off;
  }

  location / {
    proxy_pass http://$ministry_admin_upstream;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
  }
}
