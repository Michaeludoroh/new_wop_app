# Compose service targets resolved at request time (see resolver.conf).
# map creates variables so proxy_pass performs runtime DNS lookup instead of
# resolving hostnames once at nginx startup (which fails when backends boot later).

map $host $ministry_api_upstream {
  default api:4000;
}

map $host $ministry_websocket_upstream {
  default websocket:4100;
}

map $host $ministry_admin_upstream {
  default admin-web:3001;
}
