# Optional subdomain — api.woppandmopp.com
# Prefer host Nginx path routing: https://woppandmopp.com/api/ → 127.0.0.1:4000
# This block is only needed if you use a dedicated API hostname.
server {
  listen 80;
  listen [::]:80;
  server_name api.woppandmopp.com;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  client_max_body_size 100m;

  location / {
    proxy_pass http://$ministry_api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Correlation-Id $http_x_correlation_id;
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
  }
}
