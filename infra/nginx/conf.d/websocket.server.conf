# WebSocket / Socket.IO — ws.example.com
# Admin and mobile connect to {WEBSOCKET_URL}/realtime (Socket.IO namespace)
server {
  listen 80;
  listen [::]:80;
  server_name ws.example.com ws.localhost;

  add_header X-Content-Type-Options "nosniff" always;

  location / {
    proxy_pass http://$ministry_websocket_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_buffering off;
  }

  # Socket.IO polling + websocket transport
  location ~* ^/(realtime/)?socket\.io {
    proxy_pass http://$ministry_websocket_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
    proxy_buffering off;
  }
}
