# Optional subdomain — ws.woppandmopp.com
# Prefer host Nginx path routing: https://woppandmopp.com/realtime → 127.0.0.1:4100
server {
  listen 80;
  listen [::]:80;
  server_name ws.woppandmopp.com;

  add_header X-Content-Type-Options "nosniff" always;

  location / {
    proxy_pass http://$ministry_websocket_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_buffering off;
  }

  location ~* ^/(realtime/)?socket\.io {
    proxy_pass http://$ministry_websocket_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
    proxy_buffering off;
  }
}
