name: Reusable Deploy Workflow

on:
  workflow_call:
    inputs:
      environment_name:
        required: true
        type: string
      image_tag:
        required: true
        type: string
      api_health_url:
        required: true
        type: string
      ws_health_url:
        required: true
        type: string
      admin_health_url:
        required: true
        type: string
      run_compose_up:
        required: false
        type: boolean
        default: false
    secrets:
      DATABASE_URL:
        required: true
      REDIS_URL:
        required: true
      JWT_ACCESS_SECRET:
        required: true
      JWT_REFRESH_SECRET:
        required: true
      CONTENT_ACCESS_SECRET:
        required: true
      METRICS_AUTH_TOKEN:
        required: true
      CORS_ORIGIN:
        required: true
      API_PUBLIC_URL:
        required: true

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: ${{ inputs.environment_name }}
    concurrency:
      group: deploy-${{ inputs.environment_name }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate environment templates
        run: node scripts/env/validate-env.mjs --check-templates

      - name: Validate production secrets
        run: node scripts/env/validate-production-secrets.mjs --mode=${{ inputs.environment_name == 'production' && 'production' || 'staging' }}
        env:
          NODE_ENV: ${{ inputs.environment_name == 'production' && 'production' || 'staging' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          JWT_ACCESS_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 7d
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          CONTENT_ACCESS_SECRET: ${{ secrets.CONTENT_ACCESS_SECRET }}
          METRICS_AUTH_TOKEN: ${{ secrets.METRICS_AUTH_TOKEN }}
          API_PUBLIC_URL: ${{ secrets.API_PUBLIC_URL }}

      - name: Validate env contract
        run: node scripts/env/validate-env.mjs --target=api
        env:
          NODE_ENV: ${{ inputs.environment_name == 'production' && 'production' || 'staging' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          JWT_ACCESS_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 7d
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          CONTENT_ACCESS_SECRET: ${{ secrets.CONTENT_ACCESS_SECRET }}
          METRICS_AUTH_TOKEN: ${{ secrets.METRICS_AUTH_TOKEN }}
          API_PUBLIC_URL: ${{ secrets.API_PUBLIC_URL }}

      - name: Install API deps
        working-directory: services/api
        run: npm ci

      - name: Install Admin deps
        working-directory: apps/admin-web
        run: npm ci

      - name: Lint, test, and build
        run: |
          cd services/api
          npm run lint
          npm run test -- --runInBand
          npm run build
          cd ../../apps/admin-web
          npm run lint
          npm run type-check
          npm run build

      - name: Run Prisma migrations
        run: node scripts/deploy/run-migrations.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build Docker images
        run: |
          docker build -t ministry-api:${{ inputs.image_tag }} ./services/api
          docker build \
            --build-arg NEXT_PUBLIC_API_BASE_URL=${{ secrets.API_PUBLIC_URL }}/api/v1 \
            --build-arg NEXT_PUBLIC_WEBSOCKET_URL=${{ inputs.ws_health_url }} \
            -t ministry-admin:${{ inputs.image_tag }} ./apps/admin-web

      - name: Validate nginx configuration
        run: |
          docker run --rm \
            -v "$PWD/infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro" \
            -v "$PWD/infra/nginx/conf.d:/etc/nginx/conf.d:ro" \
            nginx:1.27-alpine nginx -t

      - name: Materialize production env file
        run: node scripts/deploy/materialize-production-env.mjs
        env:
          FORCE_MATERIALIZE: "1"
          DEPLOY_ENV: ${{ inputs.environment_name }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          NODE_ENV: ${{ inputs.environment_name == 'production' && 'production' || 'staging' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          JWT_ACCESS_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 7d
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          CONTENT_ACCESS_SECRET: ${{ secrets.CONTENT_ACCESS_SECRET }}
          METRICS_AUTH_TOKEN: ${{ secrets.METRICS_AUTH_TOKEN }}
          API_PUBLIC_URL: ${{ secrets.API_PUBLIC_URL }}
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.API_PUBLIC_URL }}/api/v1
          NEXT_PUBLIC_WEBSOCKET_URL: ${{ inputs.ws_health_url }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER || 'ministry' }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB || 'ministry_platform' }}

      - name: Deploy services
        run: node scripts/deploy/deploy.mjs
        env:
          DEPLOY_ENV: ${{ inputs.environment_name }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          SKIP_COMPOSE_UP: ${{ inputs.run_compose_up == true && '0' || '1' }}
          SKIP_MIGRATE_COMPOSE: "1"
          NODE_ENV: ${{ inputs.environment_name == 'production' && 'production' || 'staging' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          JWT_ACCESS_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 7d
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          CONTENT_ACCESS_SECRET: ${{ secrets.CONTENT_ACCESS_SECRET }}
          METRICS_AUTH_TOKEN: ${{ secrets.METRICS_AUTH_TOKEN }}
          API_PUBLIC_URL: ${{ secrets.API_PUBLIC_URL }}
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.API_PUBLIC_URL }}/api/v1
          NEXT_PUBLIC_WEBSOCKET_URL: ${{ inputs.ws_health_url }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER || 'ministry' }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB || 'ministry_platform' }}

      - name: Verify health endpoints
        if: inputs.run_compose_up
        run: node scripts/deploy/verify-health.mjs
        env:
          API_HEALTH_URL: ${{ inputs.api_health_url }}
          WS_HEALTH_URL: ${{ inputs.ws_health_url }}
          ADMIN_HEALTH_URL: ${{ inputs.admin_health_url }}

      - name: Rollback on failure
        if: failure() && inputs.run_compose_up
        run: node scripts/deploy/rollback.mjs
        env:
          DEPLOY_ENV: ${{ inputs.environment_name }}
          API_HEALTH_URL: ${{ inputs.api_health_url }}
          WS_HEALTH_URL: ${{ inputs.ws_health_url }}
          ADMIN_HEALTH_URL: ${{ inputs.admin_health_url }}
