name: Validation Runner

on:
  pull_request:
  workflow_dispatch:

jobs:
  validation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/validation-runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/validation-runner/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Run validation
        run: npm run validate

      - name: Verify artifacts exist
        run: |
          test -f artifacts/runtime-evidence.json
          test -f artifacts/auth-evidence.json
          test -f artifacts/websocket-evidence.json
          test -f artifacts/payments-evidence.json
          test -f artifacts/notifications-evidence.json
          test -f artifacts/readiness-report.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: validation-artifacts
          path: services/validation-runner/artifacts/*.json
