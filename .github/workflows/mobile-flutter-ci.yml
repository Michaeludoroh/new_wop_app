name: Mobile Flutter CI

on:
  push:
    paths:
      - "apps/mobile-flutter/**"
      - ".github/workflows/mobile-flutter-ci.yml"
  pull_request:
    paths:
      - "apps/mobile-flutter/**"
      - ".github/workflows/mobile-flutter-ci.yml"
  workflow_dispatch:

concurrency:
  group: mobile-flutter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-test-build:
    name: Analyze / Test / Build Flutter
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: apps/mobile-flutter

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Env validation
        run: node ../../scripts/env/validate-env.mjs
        env:
          APP_ENV: ci
          API_BASE_URL: http://localhost:4000/api/v1

      - name: Flutter analyze
        run: flutter analyze

      - name: Flutter test
        run: flutter test

      - name: Flutter build apk (validation)
        run: flutter build apk --debug

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-flutter-apk-debug
          path: apps/mobile-flutter/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: warn

      - name: Job summary
        if: always()
        run: |
          echo "## Mobile Flutter CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ flutter pub get" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ flutter analyze" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ flutter test" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ flutter build apk --debug" >> $GITHUB_STEP_SUMMARY
